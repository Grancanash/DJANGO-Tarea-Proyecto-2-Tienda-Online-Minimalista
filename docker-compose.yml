services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-tienda_db}
      POSTGRES_USER: ${DB_USER:-tienda_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tienda_user} -d ${DB_NAME:-tienda_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - media:/app/media
      - staticfiles:/app/staticfiles
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: "false"
      # === CAMBIOS AQUÍ: Puerta abierta para tu dominio y CORS ===
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,tienda.grancanash.es"
      CORS_ALLOWED_ORIGINS: "https://tienda.grancanash.es"
      CSRF_TRUSTED_ORIGINS: "https://tienda.grancanash.es"
      # =========================================================
      DB_NAME: ${DB_NAME:-tienda_db}
      DB_USER: ${DB_USER:-tienda_user}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: "5432"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      # Email (IONOS)
      EMAIL_HOST: ${EMAIL_HOST:-smtp.ionos.es}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-true}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-${EMAIL_HOST_USER}}
    entrypoint: ["sh", "-c", "python manage.py migrate --noinput && python manage.py collectstatic --noinput && exec gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120 --access-logfile -"]
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8060:80"
    volumes:
      - media:/usr/share/nginx/html/media:ro
      - staticfiles:/usr/share/nginx/html/staticfiles:ro
    depends_on:
      - backend

volumes:
  pgdata:
  media:
  staticfiles: