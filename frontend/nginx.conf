server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # React SPA: todas las rutas del frontend van a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy a la API del backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django Admin (ruta renombrada para no colisionar con el panel React)
    # Redirige /admin-django → /admin-django/ (sin barra no matchea el location)
    location = /admin-django {
        return 301 /admin-django/;
    }

    location /admin-django/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Archivos media (imágenes de productos)
    location /media/ {
        alias /usr/share/nginx/html/media/;
    }

    # Archivos estáticos de Django (admin)
    location /staticfiles/ {
        alias /usr/share/nginx/html/staticfiles/;
    }

    # Gzip
    gzip on;
    gzip_types text/css application/javascript image/svg+xml;
    gzip_min_length 256;
}
